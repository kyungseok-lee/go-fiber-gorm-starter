run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  modules-download-mode: readonly

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters-settings:
  depguard:
    rules:
      main:
        allow:
          - $gostd
          - github.com/caarlos0/env/v11
          - github.com/gofiber/fiber/v2
          - github.com/ansrivas/fiberprometheus/v2
          - github.com/google/uuid
          - github.com/joho/godotenv
          - github.com/swaggo/fiber-swagger
          - github.com/stretchr/testify
          - go.uber.org/zap
          - gorm.io/driver/mysql
          - gorm.io/driver/postgres
          - gorm.io/driver/sqlite
          - gorm.io/gorm
          - gorm.io/gorm/logger
          - github.com/kyungseok-lee/go-fiber-gorm-starter

  gci:
    sections:
      - standard
      - default
      - prefix(github.com/kyungseok-lee/go-fiber-gorm-starter)
  
  gofmt:
    simplify: true
  
  goimports:
    local-prefixes: github.com/kyungseok-lee/go-fiber-gorm-starter
  
  govet:
    enable-all: false
  
  lll:
    line-length: 120
  
  mnd:
    ignored-numbers:
      - "0"
      - "1"
      - "2"
      - "10"
      - "20"
      - "100"

  misspell:
    locale: US
  
  nakedret:
    max-func-lines: 30
  
  prealloc:
    simple: true
    range-loops: true
    for-loops: false
  
  unparam:
    check-exported: false
  
  unused:
    check-exported: false
  
  whitespace:
    multi-if: false
    multi-func: false
  
  wsl:
    strict-append: true
    allow-assign-and-call: true
    allow-multiline-assign: true
    allow-separated-leading-comment: false

linters:
  enable:
    - bodyclose
    - depguard
    - dogsled
    - dupl
    - errcheck
    - exhaustive
    - copyloopvar
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - goprintffuncname
    - gosec
    - gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - mnd
    - nakedret
    - noctx
    - nolintlint
    - revive
    - rowserrcheck
    - staticcheck
    - stylecheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - whitespace

  disable:
    - prealloc
    - wsl

issues:
  exclude-rules:
    # Exclude some linters from running on tests files.
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - funlen
        - goconst
    
    # Exclude lll issues for long lines with go:generate
    - linters:
        - lll
      source: "^//go:generate "

    # Struct tags are intentionally dense and cannot be split across lines.
    - linters:
        - lll
      source: "`.*`"

    # The seed command is an operational script; keep the flow linear.
    - path: scripts/seed\.go
      linters:
        - funlen
    
    # Exclude some staticcheck messages
    - linters:
        - staticcheck
      text: "SA9003:"
    
    # Exclude some gosec messages
    - linters:
        - gosec
      text: "G404:"  # Use of weak random number generator
    
    # Exclude some gocritic messages
    - linters:
        - gocritic
      text: "unnecessaryDefer:"

  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

severity:
  default-severity: error
  case-sensitive: false
  rules:
    - linters:
      - dupl
      severity: info
